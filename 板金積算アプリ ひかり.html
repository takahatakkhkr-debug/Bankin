<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Sans','Meiryo',system-ui,sans-serif;background:#f0f4f8;color:#1e293b;font-size:14px;overscroll-behavior:none}

/* ===== ヘッダー ===== */
.hdr{background:linear-gradient(135deg,#1e3a6e,#2563eb);color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-left .title{font-size:15px;font-weight:700}
.hdr-left .sub{font-size:10px;opacity:.7;margin-top:1px}
.hdr-right .lbl{font-size:10px;opacity:.7;text-align:right}
.hdr-right .val{font-size:20px;font-weight:700;line-height:1}

/* ===== 案件バー ===== */
.proj-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:6px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.proj-bar label{font-size:11px;color:#64748b;font-weight:600;white-space:nowrap}
.proj-bar input{border:1px solid #e2e8f0;border-radius:6px;padding:5px 8px;font-size:13px;flex:1;min-width:120px;max-width:200px}

/* ===== メインコンテンツ ===== */
.content{padding-bottom:70px;min-height:calc(100vh - 100px)}

/* ===== 下部タブバー（スマホ） ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;display:flex;z-index:200;box-shadow:0 -2px 8px rgba(0,0,0,.1)}
.nav-btn{flex:1;padding:8px 4px 10px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:#94a3b8;font-size:10px;font-weight:600;transition:color .1s}
.nav-btn.on{color:#2563eb}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-btn .badge{background:#2563eb;color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center}

/* ===== ページ（タブ切替） ===== */
.page{display:none;padding:0}
.page.on{display:block}

/* ===== 品目一覧ページ ===== */
.page-items{padding:10px}
.items-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.items-toolbar span{font-size:12px;font-weight:700;color:#475569}
.item-card{background:#fff;border-radius:10px;border:1.5px solid #e2e8f0;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .12s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.item-card.active{border-color:#2563eb;background:#eff6ff}
.item-card-row1{display:flex;justify-content:space-between;align-items:flex-start}
.item-card-name{font-size:14px;font-weight:700;color:#1e3a6e}
.item-card.active .item-card-name{color:#1d4ed8}
.item-card-price{font-size:15px;font-weight:700;color:#0f766e}
.item-card-meta{font-size:11px;color:#94a3b8;margin-top:3px}
.item-card-actions{display:flex;gap:6px;margin-top:8px}

/* ===== 入力ページ ===== */
.page-form{padding:10px}
.form-nav{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px;scrollbar-width:none}
.form-nav::-webkit-scrollbar{display:none}
.form-nav-btn{padding:5px 12px;border-radius:16px;border:1.5px solid;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;transition:all .1s;flex-shrink:0}
.section{background:#fff;border-radius:10px;border:1.5px solid;margin-bottom:10px;overflow:hidden}
.sec-hdr{padding:10px 14px;font-size:12px;font-weight:700;color:#fff;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.sec-hdr .arrow{transition:transform .2s;font-size:14px}
.sec-hdr.collapsed .arrow{transform:rotate(-90deg)}
.sec-body{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sec-body.one{grid-template-columns:1fr}
.sec-body.three{grid-template-columns:1fr 1fr 1fr}
.sec-body.collapsed{display:none}
.fld{display:flex;flex-direction:column;gap:4px}
.fld.full{grid-column:1/-1}
.fld label{font-size:11px;color:#64748b;font-weight:600}
.fld input,.fld select{padding:9px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;width:100%;background:#fff;color:#1e293b;-webkit-appearance:none}
.fld input:focus,.fld select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fld input.hl{background:#fefce8;border-color:#f59e0b}
.fld input.hl:focus{border-color:#d97706;box-shadow:0 0 0 3px rgba(245,158,11,.1)}
.cb-row{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;font-size:14px}
.cb-row input[type=checkbox]{width:20px;height:20px;cursor:pointer;accent-color:#2563eb;flex-shrink:0}

/* ===== 計算結果ページ ===== */
.page-result{padding:10px}
.res-card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.res-card-title{font-size:12px;font-weight:700;color:#475569;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #f1f5f9}
.res-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f8fafc;font-size:13px}
.res-row .lbl{color:#64748b}
.res-row .val{font-weight:500}
.res-proc-total{background:#eff6ff;border-radius:7px;padding:6px 10px;margin:6px 0;display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:#0369a1}
.res-total-card{background:linear-gradient(135deg,#1e3a6e,#2563eb);color:#fff;border-radius:12px;padding:16px;margin-bottom:10px}
.res-total-card .lbl{font-size:11px;opacity:.8}
.res-total-card .val{font-size:18px;font-weight:700;margin-top:2px}
.res-total-card .val-lg{font-size:24px;font-weight:700;margin-top:2px}
.res-unit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.3)}
.res-unit-grid .lbl{font-size:10px;opacity:.8}
.res-unit-grid .val{font-size:15px;font-weight:700;margin-top:2px}
.res-meta{background:#f8fafc;border-radius:8px;padding:10px 12px;font-size:12px;color:#94a3b8;line-height:2}

/* ===== サマリーページ ===== */
.page-summary{padding:10px}
.summary-card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.summary-card-title{font-size:13px;font-weight:700;color:#1e3a6e;margin-bottom:10px}
.grp-item{border:1.5px solid #ede9fe;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.grp-name{font-size:13px;font-weight:700;color:#6d28d9;margin-bottom:4px}
.grp-parts{font-size:11px;color:#94a3b8;margin-bottom:6px}
.grp-total{font-size:17px;font-weight:700;color:#0f766e}
.detail-row{padding:10px 0;border-bottom:1px solid #f1f5f9;cursor:pointer}
.detail-row:last-child{border-bottom:none}
.detail-row-top{display:flex;justify-content:space-between;align-items:center}
.detail-row-name{font-size:13px;font-weight:700}
.detail-row-price{font-size:14px;font-weight:700;color:#0f766e}
.detail-row-sub{font-size:11px;color:#94a3b8;margin-top:2px}
.grand-total-card{background:linear-gradient(135deg,#1e3a6e,#2563eb);color:#fff;border-radius:12px;padding:16px;margin-bottom:10px;text-align:center}
.grand-total-card .lbl{font-size:12px;opacity:.8}
.grand-total-card .val{font-size:28px;font-weight:700;margin-top:4px}

/* ===== ボタン ===== */
.btn{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:all .1s}
.btn-blue{background:#2563eb;color:#fff}
.btn-blue:active{background:#1d4ed8}
.btn-gray{background:#f1f5f9;color:#475569;border:1.5px solid #e2e8f0}
.btn-gray:active{background:#e2e8f0}
.btn-red{background:#fee2e2;color:#dc2626;border:1.5px solid #fca5a5}
.btn-red:active{background:#fecaca}
.btn-lg{padding:12px 20px;font-size:15px;border-radius:10px;width:100%}

/* ===== トースト ===== */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e3a6e;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}

/* ===== PCレイアウト（768px以上） ===== */
@media(min-width:768px){
  .bottom-nav{display:none}
  .content{padding-bottom:0;display:grid;grid-template-columns:220px 1fr 210px;gap:0;height:calc(100vh - 96px);overflow:hidden}
  .page{display:block!important;overflow-y:auto;height:100%;border-right:1px solid #e2e8f0}
  .page-items{padding:10px}
  .page-form{padding:10px}
  .page-result{padding:10px}
  .page-summary{display:none!important}
  .sec-body{grid-template-columns:1fr 1fr}
  .proj-bar input{max-width:240px}
  .pc-summary-tab{display:flex!important}
}
.pc-summary-tab{display:none;gap:4px;padding:6px 12px;background:#f0f4f8;border-bottom:1px solid #e2e8f0}
.pc-tab-btn{padding:5px 16px;border-radius:6px 6px 0 0;border:none;cursor:pointer;font-size:12px;font-weight:600}
.pc-tab-btn.on{background:#2563eb;color:#fff}
.pc-tab-btn.off{background:#e2e8f0;color:#64748b}
</style>
</head>

<script>
// ===== ES-V7 計算エンジン =====
function calcItem(p){
  const mat=p.material||'SUS', W=(+p.width_mm||0)/1000, L=(+p.length_mm||0)/1000, t=+p.thickness||0;
  const density=mat==='SUS'?8:mat==='鉄'?7.89:mat==='AL'?2.7:8;
  const area=W*L, weight=area*t/1000*density;
  const mat_cost=Math.max(weight*(+p.yield_rate||1.4)*(+p.mat_price||0)*1.25, weight>0&&+p.mat_price>0?40:0);
  const outer=(W+L)*2;
  const cut_rate=mat==='SUS'||mat==='AL'?210:110;
  const cut_total=outer*t*cut_rate + outer*t*80;
  function hole(d,c,df){if(!+c)return 0;return Math.max(Math.ceil(+d*3.14*1.0*df)*+c,40);}
  const hole_total=hole(p.hole1_dia||6,p.hole1_cnt,1)+hole(p.hole2_dia||6,p.hole2_cnt,1)
    +hole(p.tap_dia||6,p.tap_cnt,3.1)+hole(p.sara_dia||6,p.sara_cnt,2)+hole(p.long_dia||6,p.long_cnt,2);
  function br(m,th){if(m==='SUS')return th<=1.5?315:th<=2?420:th<=2.5?525:th<=3?630:th<=4?840:th<=5?1050:1890;if(m==='AL')return th<=2?220:th<=3?370:th<=4?590:740;return 220;}
  const bend_total=(+p.bend_L||0)*L*t*br(mat,t)+(+p.bend_W||0)*W*t*br(mat,t)+(+p.bend_sharp||0)*L*t*br(mat,t)*2;
  function wS(m,th){return m==='鉄'?(th<=1.5?32:th<=2?42:th<=2.5?53:th<=3?63:th<=4?84:105):(th<=1.6?38:th<=2.3?44:th<=3.2?51:th<=4.5?72:th<=6?96:144);}
  function wL(m,th){return m==='鉄'?(th<=1.5?529:th<=2?706:th<=2.5?882:th<=3?1058:th<=4?1411:th<=5?1764:3175):(th<=1.6?2880:th<=2.3?2990:3152);}
  function wA(m,th){return m==='鉄'?(th<=1.5?529:th<=2?706:th<=2.5?882:1058):(th<=1.6?307:th<=2.3?353:th<=3.2?410:th<=4.5?576:th<=6?768:th<=9?1152:1536);}
  const weld_total=
    (+p.weld_spot?((+p.spot||0)*wS(mat,t)):0)+
    (+p.weld_tigL?(((W+L)*2*(+p.tigL_pct||100)/100)*0.2*wL(mat,t)):0)+
    (+p.weld_tigX?((W*(+p.tigX_pct||100)/100)*2*3175):0)+
    (+p.weld_arc?((+p.arc||0)*wA(mat,t)):0)+
    (+p.weld_bead?((+p.bead||0)*wA(mat,t)*1.2):0);
  const other_total=weight*64+area*1000;
  const mekki=+p.mekki?Math.max(weight*330*1.5,40):0;
  const ALM={alm_s:1914,alm_d:1914,clear_s:1987,clear_d:1987,yojo_s:792,yojo_d:792};
  const ak=p.alm_kind||'none', aUnit=ALM[ak]||0, aArea=ak.endsWith('_d')?area*2:area;
  const aFinal=ak!=='none'&&aArea<=0.1?Math.round(aUnit*1.2):aUnit;
  const alm=ak!=='none'?Math.max(aArea*aFinal*1.5,40):0;
  const yaki=+p.yaki?Math.max(area*6000*1.5,40):0;
  const out_total=mekki+alm+yaki;
  const proc=cut_total+hole_total+bend_total+weld_total+other_total+out_total;
  const cost_per=mat_cost+proc, est_per=Math.round(cost_per*1.15), qty=+p.qty||1;
  return{material_cost:Math.round(mat_cost),cut_total:Math.round(cut_total),hole_total:Math.round(hole_total),
    bend_total:Math.round(bend_total),weld_total:Math.round(weld_total),other_total:Math.round(other_total),
    out_total:Math.round(out_total),proc_total:Math.round(proc),cost_per:Math.round(cost_per),
    est_per,est_total:est_per*qty,qty,weight:Math.round(weight*100)/100,area:Math.round(area*10000)/10000};
}

const yen=v=>v?'¥'+Math.round(v).toLocaleString():'—';
let items=[],active=0,uid=1,currentNav='items',pcMainTab='main';
const SK='hikari_bankin_v2';

function def(n){return{id:uid++,name:'品目'+String(n).padStart(2,'0'),material:'SUS',
  width_mm:0,length_mm:0,thickness:1.6,yield_rate:1.4,mat_price:0,qty:1,parts_per:1,group:'',
  hole1_dia:6,hole1_cnt:0,hole2_dia:6,hole2_cnt:0,tap_dia:6,tap_cnt:0,sara_dia:6,sara_cnt:0,long_dia:6,long_cnt:0,
  bend_L:0,bend_W:0,bend_sharp:0,spot:0,weld_spot:0,tigL_pct:100,weld_tigL:0,tigX_pct:100,weld_tigX:0,arc:0,weld_arc:0,bead:0,weld_bead:0,mekki:0,alm_kind:'none',yaki:0};}

function saveData(){
  localStorage.setItem(SK,JSON.stringify({items,active,
    project:document.getElementById('project-name').value,
    date:document.getElementById('project-date').value}));
  showToast();
}
function loadData(){
  const raw=localStorage.getItem(SK);
  if(raw){try{const d=JSON.parse(raw);items=d.items||[def(1)];active=d.active||0;
    uid=Math.max(...items.map(x=>x.id))+1;
    document.getElementById('project-name').value=d.project||'';
    document.getElementById('project-date').value=d.date||'';return;}catch(e){}}
  items=[def(1)];active=0;
  document.getElementById('project-date').value=new Date().toISOString().slice(0,10);
}
let toastT;
function showToast(){const t=document.getElementById('toast');t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1500);}

// ===== ナビゲーション =====
function navTo(pg){
  currentNav=pg;
  ['items','form','result','summary'].forEach(p=>{
    document.getElementById('page-'+p).classList.toggle('on',p===pg);
    document.getElementById('nav-'+p).classList.toggle('on',p===pg);
  });
  if(pg==='summary') buildSummary();
}
function pcTab(t){
  pcMainTab=t;
  document.querySelectorAll('.pc-tab-btn').forEach((b,i)=>b.className='pc-tab-btn '+(i===(t==='main'?0:1)?'on':'off'));
  document.getElementById('page-summary').style.display=t==='summary'?'block':'none';
  if(t==='summary') buildSummary();
}

// ===== 品目一覧 =====
function buildItemList(){
  const results=items.map(calcItem);
  const grand=results.reduce((s,r)=>s+r.est_total,0);
  document.getElementById('grand-total').textContent='¥'+grand.toLocaleString();
  document.getElementById('item-count').textContent=`品目一覧（${items.length}件）`;
  document.getElementById('item-list').innerHTML=items.map((it,i)=>`
    <div class="item-card${i===active?' active':''}" onclick="selectItem(${i})">
      <div class="item-card-row1">
        <div class="item-card-name">${it.name||'品目'+(i+1)}</div>
        <div class="item-card-price">${yen(results[i].est_total)}</div>
      </div>
      <div class="item-card-meta">${it.material} / ${it.thickness}mm / ${it.qty}本${it.group?' 【'+it.group+'】':''}</div>
      <div class="item-card-actions">
        <button class="btn btn-blue" onclick="event.stopPropagation();selectItem(${i});navTo('form')">入力</button>
        <button class="btn btn-gray" onclick="event.stopPropagation();selectItem(${i});navTo('result')">結果</button>
        <button class="btn btn-gray" onclick="event.stopPropagation();copyItem(${i})">複製</button>
        <button class="btn btn-red"  onclick="event.stopPropagation();removeItem(${i})">削除</button>
      </div>
    </div>`).join('');
}

function selectItem(i){active=i;buildItemList();buildForm();buildResult();}

// ===== 入力フォーム =====
const SECTIONS=[
  {id:'basic', label:'基本情報', color:'#1e3a6e'},
  {id:'hole',  label:'穴加工',   color:'#0369a1'},
  {id:'bend',  label:'曲げ',     color:'#6d28d9'},
  {id:'weld',  label:'溶接',     color:'#92400e'},
  {id:'out',   label:'外注',     color:'#065f46'},
];
let openSec='basic';
function toggleSec(id){openSec=openSec===id?null:id;buildForm();}

function fld(label,key,hl,type='number',step='any'){
  const v=items[active][key]??'';
  return `<div class="fld"><label>${label}</label>
    <input type="${type}" value="${v}" ${hl?'class="hl"':''} step="${step}" min="0"
      oninput="upd('${key}',this.value)" inputmode="${type==='number'?'decimal':'text'}">
  </div>`;}
function selFld(label,key,opts){
  const v=items[active][key]||opts[0];
  return `<div class="fld"><label>${label}</label><select onchange="upd('${key}',this.value)">${opts.map(o=>`<option${v===o?' selected':''}>${o}</option>`).join('')}</select></div>`;}
function cbFld(key,label){
  return `<label class="cb-row"><input type="checkbox" ${items[active][key]?'checked':''} onchange="upd('${key}',this.checked?1:0)"><span>${label}</span></label>`;}

function weldRow(onKey, valKey, label, unit, isCoeff, step){
  const it=items[active];
  const isOn=!!it[onKey];
  const val=it[valKey]??'';
  const defaultVal=isCoeff?100:0;
  return `<div style="background:${isOn?'#fefce8':'#f8fafc'};border:1.5px solid ${isOn?'#f59e0b':'#e2e8f0'};border-radius:8px;padding:8px;transition:all .2s">
    <label class="cb-row" style="padding:0 0 6px;font-size:12px;font-weight:700;color:${isOn?'#92400e':'#94a3b8'}">
      <input type="checkbox" ${isOn?'checked':''} onchange="updWeld('${onKey}','${valKey}',this.checked,${defaultVal})" style="width:18px;height:18px;accent-color:#f59e0b">
      <span>${label}</span>
      <span style="font-size:10px;font-weight:400;margin-left:4px;opacity:.7">${unit}</span>
    </label>
    ${isOn?`<input type="number" value="${val}" class="hl" step="${step||'any'}" min="0"
      style="width:100%;padding:7px 8px;border:1.5px solid #f59e0b;border-radius:6px;font-size:15px;background:#fff"
      oninput="upd('${valKey}',this.value)" inputmode="decimal">`
    :`<div style="font-size:12px;color:#cbd5e1;text-align:center;padding:4px">OFF</div>`}
  </div>`;
}
window.updWeld=function(onKey,valKey,checked,defaultVal){
  items[active][onKey]=checked?1:0;
  if(checked && !items[active][valKey]) items[active][valKey]=defaultVal;
  buildForm();buildItemList();buildResult();saveData();
};

function buildForm(){
  if(!items.length)return;
  // セクションナビ
  document.getElementById('form-nav').innerHTML=SECTIONS.map(s=>
    `<button class="form-nav-btn" style="border-color:${s.color};background:${openSec===s.id?s.color:'#fff'};color:${openSec===s.id?'#fff':s.color}" onclick="toggleSec('${s.id}')">${s.label}</button>`
  ).join('');
  // フォーム本体
  const it=items[active];
  const almSel=`<div class="fld full"><label>アルマイト</label><select onchange="upd('alm_kind',this.value)">
    <option value="none"   ${it.alm_kind==='none'?   'selected':''}>なし</option>
    <option value="alm_s"  ${it.alm_kind==='alm_s'?  'selected':''}>アルマイト 片面 ¥1,914/㎡</option>
    <option value="alm_d"  ${it.alm_kind==='alm_d'?  'selected':''}>アルマイト 両面 ¥1,914/㎡×2</option>
    <option value="clear_s"${it.alm_kind==='clear_s'?'selected':''}>クリアー 片面 ¥1,987/㎡</option>
    <option value="clear_d"${it.alm_kind==='clear_d'?'selected':''}>クリアー 両面 ¥1,987/㎡×2</option>
    <option value="yojo_s" ${it.alm_kind==='yojo_s'? 'selected':''}>養生 片面 ¥792/㎡</option>
    <option value="yojo_d" ${it.alm_kind==='yojo_d'? 'selected':''}>養生 両面 ¥792/㎡×2</option>
  </select></div>`;
  const secBody={
    basic:`<div class="fld full"><label>品名</label><input type="text" value="${it.name||''}" oninput="upd('name',this.value)" inputmode="text"></div>
      ${selFld('材質','material',['SUS','鉄','AL'])}
      ${fld('糸幅 (mm)','width_mm',false,'number',0.1)}
      ${fld('L寸 (mm)','length_mm',false,'number',0.1)}
      ${fld('板厚 (mm)','thickness',false,'number',0.1)}
      ${fld('歩留まり','yield_rate',false,'number',0.01)}
      ${fld('材料単価 (円/kg)','mat_price')}
      ${fld('製品数量 (本)','qty',false,'number',1)}
      ${fld('パーツ数/製品','parts_per',false,'number',1)}
      <div class="fld full"><label>グループ名</label><input type="text" class="hl" value="${it.group||''}" oninput="upd('group',this.value)" placeholder="例：組立A" inputmode="text"></div>`,
    hole:`${fld('丸穴① 径(mm)','hole1_dia')} ${fld('丸穴① 個数','hole1_cnt',true)}
      ${fld('丸穴② 径(mm)','hole2_dia')} ${fld('丸穴② 個数','hole2_cnt',true)}
      ${fld('タップ 径(mm)','tap_dia')}   ${fld('タップ 個数','tap_cnt',true)}
      ${fld('皿穴 径(mm)','sara_dia')}    ${fld('皿穴 個数','sara_cnt',true)}
      ${fld('長穴 径(mm)','long_dia')}    ${fld('長穴 個数','long_cnt',true)}`,
    bend:`${fld('L方向 角数','bend_L',true)} ${fld('糸幅方向 角数','bend_W',true)}
      <div class="fld full">${fld('鋭角・ヘミング 角数','bend_sharp',true)}</div>`,
    weld:`
      <div class="fld full" style="grid-column:1/-1">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${weldRow('weld_spot','spot','点溶接','打点数',false)}
          ${weldRow('weld_tigL','tigL_pct','TigL','係数(%)' ,true)}
          ${weldRow('weld_tigX','tigX_pct','Tig断面','係数(%)',true)}
          ${weldRow('weld_arc','arc','アーク溶接','溶接長(m)',false,0.01)}
          ${weldRow('weld_bead','bead','ビード仕上','長さ(m)',false,0.01)}
        </div>
      </div>`,
    out:`<div class="sec-body one" style="padding:0">
      ${cbFld('mekki','メッキ')}
      ${almSel}
      ${cbFld('yaki','焼き付け塗装')}
    </div>`,
  };
  document.getElementById('form-body').innerHTML=SECTIONS.map(s=>{
    const isOpen=openSec===s.id;
    return `<div class="section" style="border-color:${s.color}">
      <div class="sec-hdr${isOpen?'':' collapsed'}" style="background:${s.color}" onclick="toggleSec('${s.id}')">
        ${s.label}<span class="arrow">▾</span>
      </div>
      <div class="sec-body${isOpen?'':' collapsed'}">${secBody[s.id]}</div>
    </div>`;
  }).join('')+`<div style="height:10px"></div>`;
}

// ===== 計算結果 =====
function buildResult(){
  if(!items.length)return;
  const r=calcItem(items[active]);
  document.getElementById('result-body').innerHTML=`
    <div class="res-total-card">
      <div class="lbl">見積単価（1本）</div>
      <div class="val">${yen(r.est_per)}</div>
      <div class="lbl" style="margin-top:10px">見積合計（${r.qty}本）</div>
      <div class="val-lg">${yen(r.est_total)}</div>
      <div class="res-unit-grid">
        <div><div class="lbl">㎡単価</div><div class="val">${r.area>0?'¥'+Math.round(r.est_per/r.area).toLocaleString():'—'}</div></div>
        <div><div class="lbl">キロ単価</div><div class="val">${r.weight>0?'¥'+Math.round(r.est_per/r.weight).toLocaleString():'—'}</div></div>
      </div>
    </div>
    <div class="res-card">
      <div class="res-card-title">原価内訳</div>
      ${[['材料費',r.material_cost],['外周切断費',r.cut_total],['穴加工費',r.hole_total],
         ['曲げ費',r.bend_total],['溶接費',r.weld_total],['取扱・養生費',r.other_total],['外注費',r.out_total]]
        .map(([l,v])=>`<div class="res-row"><span class="lbl">${l}</span><span class="val">${yen(v)}</span></div>`).join('')}
      <div class="res-proc-total"><span>加工費合計</span><span>${yen(r.proc_total)}</span></div>
      <div class="res-row" style="border-top:2px solid #334155;margin-top:4px;padding-top:8px">
        <span class="lbl" style="font-weight:700">原価合計</span><span class="val" style="font-weight:700">${yen(r.cost_per)}</span></div>
      <div class="res-row"><span class="lbl">管理費・利益(15%)</span><span class="val">${yen(r.est_per-r.cost_per)}</span></div>
    </div>
    <div class="res-meta">重量：${r.weight} kg　／　面積：${r.area} ㎡</div>
    <div style="height:10px"></div>`;
}

// ===== サマリー =====
function buildSummary(){
  const results=items.map(calcItem);
  const grand=results.reduce((s,r)=>s+r.est_total,0);
  const groups={};
  items.forEach((x,i)=>{const g=(x.group||'').trim();if(g){if(!groups[g])groups[g]={names:[],total:0};groups[g].names.push(x.name);groups[g].total+=results[i].est_total;}});
  const proj=document.getElementById('project-name').value;
  const dt=document.getElementById('project-date').value;
  document.getElementById('summary-body').innerHTML=`
    <div class="grand-total-card">
      <div class="lbl">${proj||'見積合計'} ${dt?'（'+dt+'）':''}</div>
      <div class="val">¥${grand.toLocaleString()}</div>
    </div>
    ${Object.keys(groups).length?`<div class="summary-card">
      <div class="summary-card-title">グループ合算</div>
      ${Object.entries(groups).map(([g,d])=>`
        <div class="grp-item">
          <div class="grp-name">【${g}】</div>
          <div class="grp-parts">${d.names.join('、')}</div>
          <div class="grp-total">${yen(d.total)}</div>
        </div>`).join('')}
    </div>`:''}
    <div class="summary-card">
      <div class="summary-card-title">品目明細</div>
      ${items.map((x,i)=>{const r=results[i];return`
        <div class="detail-row" onclick="selectItem(${i});navTo('form')">
          <div class="detail-row-top">
            <div class="detail-row-name">${x.name}</div>
            <div class="detail-row-price">${yen(r.est_total)}</div>
          </div>
          <div class="detail-row-sub">${x.material} ${x.thickness}mm × ${x.qty}本　単価${yen(r.est_per)}${x.group?' 【'+x.group+'】':''}</div>
        </div>`}).join('')}
    </div>
    <div style="height:10px"></div>`;
}

// ===== イベント =====
window.upd=function(key,val){
  const numKeys=['width_mm','length_mm','thickness','yield_rate','mat_price','qty','parts_per',
    'hole1_dia','hole1_cnt','hole2_dia','hole2_cnt','tap_dia','tap_cnt','sara_dia','sara_cnt','long_dia','long_cnt',
    'bend_L','bend_W','bend_sharp','spot','weld_spot','tigL_pct','weld_tigL','tigX_pct','weld_tigX','arc','weld_arc','bead','weld_bead','mekki','yaki'];
  items[active][key]=numKeys.includes(key)?(parseFloat(val)||0):val;
  buildItemList();buildResult();saveData();
};
window.addItem=function(){items.push(def(items.length+1));active=items.length-1;render();navTo('form');};
window.removeItem=function(i){if(items.length<=1){alert('最後の品目は削除できません');return;}items.splice(i,1);active=Math.min(active,items.length-1);render();saveData();};
window.copyItem=function(i){const c={...items[i],id:uid++,name:items[i].name+'_copy'};items.splice(i+1,0,c);active=i+1;render();saveData();};

function render(){buildItemList();buildForm();buildResult();}
loadData();render();
</script>
